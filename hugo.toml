baseURL = 'https://blog.pu0.me/'
languageCode = 'zh-cn'
title = '心有所向'
theme = 'PaperMod'

defaultContentLanguage = 'zh'

disableKinds = ['taxonomy', 'term']

[params]
  defaultTheme = 'auto'
  ShowReadingTime = true
  ShowShareButtons = false
  ShowPostNavLinks = true
  ShowCodeCopyButtons = true
  ShowBreadCrumbs = true
  ShowToc = true
  displayFullLangName = true

  [params.assets]
    favicon = 'Coco.svg'
    favicon16x16 = 'Coco.svg'
    favicon32x32 = 'Coco.svg'
    apple_touch_icon = 'Coco.svg'
    safari_pinned_tab = 'Coco.svg'

  [params.homeInfoParams]
    Title = '心有所向'
    Content = '记录技术折腾、工作流、AI 协作，还有一些值得留下来的想法。'

[menu]
  [[menu.main]]
    identifier = 'home'
    name = '首页'
    url = '/'
    weight = 1
  [[menu.main]]
    identifier = 'posts'
    name = '文章'
    url = '/posts/'
    weight = 2
